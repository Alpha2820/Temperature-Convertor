<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Convertor</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="page">
        <div class="card">
            <header class="card-header">
                <h1>Temperature Converter</h1>
                <p class="subtitle">Quickly convert between Celsius, Fahrenheit, and Kelvin.</p>
            </header>

            <div class="card-body">
                <div class="field">
                    <label for="mode">Convert</label>
                    <select id="mode">
                        <option value="cToF">Celsius → Fahrenheit</option>
                        <option value="fToC">Fahrenheit → Celsius</option>
                        <option value="cToK">Celsius → Kelvin</option>
                        <option value="kToC">Kelvin → Celsius</option>
                        <option value="fToK">Fahrenheit → Kelvin</option>
                        <option value="kToF">Kelvin → Fahrenheit</option>
                    </select>
                </div>

                <div class="field">
                    <label for="temperature">Temperature</label>
                    <input type="number" id="temperature" placeholder="Enter a value" autocomplete="off" />
                </div>

                <div class="actions">
                    <button id="convertBtn" type="button">Convert</button>
                    <button id="resetBtn" type="button" class="secondary">Reset</button>
                </div>

                <div id="result" class="result" aria-live="polite">Enter a value and press Convert.</div>

                <div class="history">
                    <h2>Recent conversions</h2>
                    <ul id="historyList" class="history-list"></ul>
                </div>
            </div>

            <footer class="footer">Tip: press Enter to convert.</footer>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
